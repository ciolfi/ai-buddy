<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="description" content="A multi-agent application." />
    <title>Ollama Web UI</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/public/icon-192.png" />
    <title>Private AI Vault (WebGPU 2026)</title>

    <style>
      /* BASE STYLES */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        display: flex;
        justify-content: center;
        padding: 20px;
        color: #333;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      header {
        border-bottom: 2px solid #eee;
        margin-bottom: 20px;
        padding-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        color: #2c3e50;
      }

      #gpu-status {
        font-size: 0.75rem;
        color: #666;
        margin-top: 5px;
        font-family: monospace;
      }

      /* CONTROL PANEL */
      .control-panel {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .model-picker {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }

      select,
      button {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        font-size: 0.9rem;
      }

      button {
        cursor: pointer;
        background-color: lightblue;
        color: black;
        border: none;
        transition: opacity 0.2s;
      }

      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .danger-btn {
        background-color: pink;
      }

      /* PROGRESS BAR STYLES */
      #loading-container {
        margin: 15px 0;
        padding: 10px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 6px;
      }

      #progress-text {
        font-size: 0.8rem;
        color: #555;
        margin-bottom: 8px;
        display: block;
        min-height: 1.2em;
        font-family: monospace;
      }

      .progress-track {
        width: 100%;
        background-color: #e9ecef;
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
      }

      #progress-bar {
        width: 0%; /* Managed by JS */
        height: 100%;
        background-color: #28a745;
        transition: width 0.3s ease;
      }

      /* CHAT SECTION */
      #messages {
        height: 300px;
        overflow-y: auto;
        border: 1px solid #eee;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        background: #fdfdfd;
      }

      .message {
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        max-width: 85%;
        line-height: 1.4;
      }

      .user-msg {
        background: #e3f2fd;
        align-self: flex-end;
        margin-left: auto;
      }
      .ai-msg {
        background: #f1f1f1;
        color: #333;
      }

      .input-group {
        display: flex;
        gap: 10px;
      }
      textarea {
        flex-grow: 1;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        resize: none;
        height: 50px;
      }

      .vault-section {
        margin-top: 15px;
        border-top: 1px dashed #ccc;
        padding-top: 15px;
      }

      #vault-status {
        font-size: 0.85rem;
        margin-bottom: 8px;
      }

      #index-progress {
        display: none;
        font-size: 0.8rem;
        color: #007bff;
      }

      #file-input {
        display: none;
      }

      /* Labels that trigger the hidden file input */
      .vault-label {
        cursor: pointer;
        color: blue;
        text-decoration: underline;
        font-size: 0.85rem;
        font-weight: 500;
      }

      #send-btn {
        background-color: lightgray;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <header>
          <h1>AI Local Vault6</h1>
          <div id="gpu-status">WebGPU Status: Checking...</div>
        </header>

        <section class="control-panel">
          <div class="model-picker">
            <label for="model-select">Select AI Model:</label>
            <select id="model-select" title="ai model selector">
              <option value="SmolLM2-135M-Instruct-q0f32-MLC">
                SmolLM2 (Smallest/Fastest)
              </option>
              <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC">
                Phi-3 Mini (Recommended)
              </option>
              <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">
                Llama 3.2 1B (Smartest)
              </option>
            </select>
            <button id="download-btn" type="button">Load AI Engine</button>
            <button id="clear-cache-btn" type="button" class="danger-btn">
              Clear Cache
            </button>
          </div>

          <div id="loading-container">
            <span id="progress-text">Ready to initialize...</span>
            <div class="progress-track">
              <div id="progress-bar"></div>
            </div>
          </div>

          <div class="vault-section">
            <label id="vault-status" for="file-input" class="vault-label"
              >Vault: No text loaded (Click to upload)</label
            >
            <input
              type="file"
              id="file-input"
              accept=".txt"
              name="vaultinput"
            />
            <div id="index-progress">
              Indexing: <span id="index-percent">0</span>%
            </div>
          </div>
        </section>

        <section id="chat-container">
          <div id="messages"></div>
          <div class="input-group">
            <textarea
              id="prompt"
              placeholder="Ask your vault a question... (Shift+Enter for new line)"
            ></textarea>
            <button id="send-btn" type="button">Send</button>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="./app.js"></script>

    <script>
      document
        .getElementById("clear-cache-btn")
        ?.addEventListener("click", async () => {
          if (confirm("Wipe all local AI models and start over?")) {
            // Clearing Site Data Programmatically
            localStorage.clear();
            const cachesKeys = await caches.keys();
            for (const key of cachesKeys) {
              await caches.delete(key);
            }
            alert("Cache cleared. Reloading...");
            location.reload();
          }
        });
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("./sw.js")
          .then(() => console.log("PWA Service Worker Active"));
      }
    </script>
  </body>
</html>
